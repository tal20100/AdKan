name: AdKan
options:
  bundleIdPrefix: com.talhayun
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  AdKan:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "ScreenTime/RealScreenTimeProvider.swift"
          - "**/*.storekit"
          - "**/*.entitlements"
          - "**/*.plist"
          - "**/*.xcprivacy"
    resources:
      - path: App/Assets.xcassets
      - path: App/Localizable.xcstrings
      - path: App/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talhayun.AdKan
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: AdKan
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDevelopmentRegion: he
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        INFOPLIST_KEY_CFBundleURLTypes: "[{CFBundleURLSchemes = (adkan);}]"
    dependencies:
      - target: AdKanWidget
        embed: true
      - target: AdKanShieldConfiguration
        embed: true
      - target: AdKanDeviceActivityMonitor
        embed: true

  AdKanWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
        excludes:
          - "SharedDefaults.swift"
          - "Assets.xcassets"
      - path: App/Models/SharedDefaults.swift
    resources:
      - path: Widget/Assets.xcassets
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: AdKan
        CFBundleIdentifier: com.talhayun.AdKan.AdKanWidget
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talhayun.AdKan.AdKanWidget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        FRAMEWORK_SEARCH_PATHS: "$(inherited)"
    dependencies:
      - framework: WidgetKit.framework
        weak: true
      - framework: SwiftUI.framework
        weak: true

  AdKanShieldConfiguration:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldConfiguration
    info:
      path: ShieldConfiguration/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talhayun.AdKan.ShieldConfiguration
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        FRAMEWORK_SEARCH_PATHS: "$(inherited)"
    dependencies:
      - framework: ManagedSettings.framework
        weak: true
      - framework: ManagedSettingsUI.framework
        weak: true

  AdKanDeviceActivityMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: DeviceActivityMonitor
    info:
      path: DeviceActivityMonitor/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talhayun.AdKan.DeviceActivityMonitor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        FRAMEWORK_SEARCH_PATHS: "$(inherited)"
    dependencies:
      - framework: DeviceActivity.framework
        weak: true
      - framework: FamilyControls.framework
        weak: true
      - framework: ManagedSettings.framework
        weak: true

  AdKanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AdKanTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talhayun.AdKanTests
    dependencies:
      - target: AdKan

schemes:
  AdKan:
    build:
      targets:
        AdKan: all
        AdKanTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AdKanTests
