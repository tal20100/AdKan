name: AdKan
options:
  bundleIdPrefix: com.talhayun
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  AdKan:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "ScreenTime/RealScreenTimeProvider.swift"
          - "**/*.storekit"
          - "**/*.entitlements"
          - "**/*.plist"
          - "**/*.xcprivacy"
    resources:
      - path: App/Assets.xcassets
      - path: App/Localizable.xcstrings
      - path: App/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talhayun.AdKan
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: AdKan
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDevelopmentRegion: he
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies: []

  AdKanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AdKanTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talhayun.AdKanTests
    dependencies:
      - target: AdKan

schemes:
  AdKan:
    build:
      targets:
        AdKan: all
        AdKanTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AdKanTests
